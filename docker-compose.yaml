services:
  postgres:
      image: postgres
      shm_size: '4gb'
      container_name: postgres
      restart: unless-stopped
      environment:
          - POSTGRES_HOST_AUTH_METHOD=trust
      ports:  
          - 5432:5432
  pgadmin:
    container_name: pgadmin4
    image: dpage/pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

